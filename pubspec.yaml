name: footystats_team_clean
description: A team stat tracker app for AFL-style games.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  csv: ^5.0.2
  permission_handler: ^11.0.0
  path_provider: ^2.0.15
  path_provider_linux: ^2.2.1
  path_provider_windows: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
